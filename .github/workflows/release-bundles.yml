name: release-bundles

# Builds self-contained, offline W.H.I.S.P.R. bundles for Windows and Linux.
# Each bundle includes the Python runtime, all dependencies, an ffmpeg binary, and
# the selected Whisper models, so it can be copied to an air-gapped machine and run
# with no network access. The build runners use the internet; the targets do not.
#
# For fast iteration, "Run workflow" defaults to a single model (small) on both
# OSes; set platform=windows (or linux) and keep models=small for the quickest
# test build. Tagged releases (bundle-v*) bundle the full small,medium,large-v3
# set automatically.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which OS to build (use one for faster test iteration)"
        type: choice
        options: [both, linux, windows]
        default: both
      models:
        description: "Comma-separated models to bundle (e.g. base.en,small,medium,large-v3)"
        default: "base.en"
      diarizer:
        description: "Diarization backend (pyannote = best on hard audio, adds CPU PyTorch; sherpa = smaller/faster build)"
        type: choice
        options: [pyannote, sherpa]
        default: pyannote
  push:
    tags:
      - "bundle-v*"

jobs:
  # Build the job matrix from the platform input so test runs can target one OS.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - id: matrix
        run: |
          linux='{"os":"ubuntu-latest","artifact":"whispr-linux-x86_64"}'
          windows='{"os":"windows-latest","artifact":"whispr-windows-x86_64"}'
          case "${{ github.event.inputs.platform || 'both' }}" in
            linux) include="[$linux]" ;;
            windows) include="[$windows]" ;;
            *) include="[$linux,$windows]" ;;
          esac
          echo "value={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    env:
      # Defaults to pyannote (the deployable diarizer); push/tag builds have no
      # inputs, so they get pyannote too.
      DIARIZER: ${{ github.event.inputs.diarizer || 'pyannote' }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Always-present GUI runtime stack + build tools. faster-whisper/
          # ctranslate2 do the transcription; sherpa-onnx is the fallback diarizer.
          pip install faster-whisper ttkbootstrap sherpa-onnx
          pip install pyinstaller imageio-ffmpeg huggingface-hub
      - name: Install pyannote diarizer (CPU PyTorch)
        if: env.DIARIZER == 'pyannote'
        # Install CPU-only torch from PyTorch's CPU index FIRST so pyannote.audio
        # finds it already satisfied and never pulls the ~3.5 GB CUDA wheels.
        run: |
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install pyannote.audio
      - name: Install whispr package
        # --no-deps: the GUI doesn't need the whisper engine's torch dep; pyannote
        # (when selected) already provided CPU torch above.
        run: pip install --no-deps .
      - name: Fetch ffmpeg
        run: python packaging/fetch_assets.py ffmpeg
      - name: Fetch models
        run: python packaging/fetch_assets.py models ${{ github.event.inputs.models || 'base.en,small,medium,large-v3' }}
      - name: Fetch diarization models (sherpa-onnx)
        if: env.DIARIZER == 'sherpa'
        run: python packaging/fetch_assets.py diarization
      - name: Fetch diarization models (pyannote, gated)
        if: env.DIARIZER == 'pyannote'
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: python packaging/fetch_assets.py pyannote
      - name: Build bundle
        run: pyinstaller --noconfirm packaging/whispr.spec
      - name: Upload bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: dist/whispr
          if-no-files-found: error
          retention-days: 14
