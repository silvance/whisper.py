name: release-bundles

# Builds self-contained, offline W.H.I.S.P.R. bundles for Windows and Linux.
# Each bundle includes the Python runtime, all dependencies, an ffmpeg binary, and
# the selected Whisper models, so it can be copied to an air-gapped machine and run
# with no network access. The build runners use the internet; the targets do not.
#
# For fast iteration, "Run workflow" lets you build a single OS and a single model
# (e.g. platform=windows, models=small) so a test build is much quicker.

on:
  workflow_dispatch:
    inputs:
      platform:
        description: "Which OS to build (use one for faster test iteration)"
        type: choice
        options: [both, linux, windows]
        default: both
      models:
        description: "Comma-separated models to bundle (tiny,base,small,medium,large-v3)"
        default: "small,medium,large-v3"
  push:
    tags:
      - "bundle-v*"

jobs:
  # Build the job matrix from the platform input so test runs can target one OS.
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.value }}
    steps:
      - id: matrix
        run: |
          linux='{"os":"ubuntu-latest","artifact":"whispr-linux-x86_64"}'
          windows='{"os":"windows-latest","artifact":"whispr-windows-x86_64"}'
          case "${{ github.event.inputs.platform || 'both' }}" in
            linux) include="[$linux]" ;;
            windows) include="[$windows]" ;;
            *) include="[$linux,$windows]" ;;
          esac
          echo "value={\"include\":$include}" >> "$GITHUB_OUTPUT"

  build:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: "pip"
      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Install ONLY the GUI runtime stack + build tools. The whispr package
          # is installed with --no-deps so the core `torch` dependency (and its
          # ~3.5 GB of CUDA/triton wheels) is NOT pulled in - the GUI runs on
          # faster-whisper/ctranslate2 and never imports torch. Keeping torch out
          # of the environment keeps it out of the PyInstaller bundle entirely.
          pip install faster-whisper ttkbootstrap sherpa-onnx
          pip install pyinstaller imageio-ffmpeg huggingface-hub
          pip install --no-deps .
      - name: Fetch ffmpeg
        run: python packaging/fetch_assets.py ffmpeg
      - name: Fetch models
        run: python packaging/fetch_assets.py models ${{ github.event.inputs.models || 'small,medium,large-v3' }}
      - name: Fetch diarization models
        run: python packaging/fetch_assets.py diarization
      - name: Build bundle
        run: pyinstaller --noconfirm packaging/whispr.spec
      - name: Upload bundle
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: ${{ matrix.artifact }}
          path: dist/whispr
          if-no-files-found: error
          retention-days: 14
